name: Monitoreo Adzone

on:
  schedule:
    # Cada hora (UTC). Ajustá según zona horaria deseada.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: adzone-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar monitor
        id: monitor
        continue-on-error: true
        run: node scripts/monitor.mjs

      - name: Aviso si el monitor falló
        if: steps.monitor.outcome == 'failure'
        run: echo "::warning::Monitor con errores (red o HTTP); revisá el log y los artefactos del job."

      - name: Commit y push si hay cambios
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json logs/changes.log
          if git diff --staged --quiet; then
            echo "Sin cambios en snapshot ni log; no se hace commit."
          else
            git commit -m "chore(monitor): cambio detectado en assets Adzone"
            git push
          fi
