name: Monitoreo Adzone

on:
  schedule:
    # Cada hora (UTC). Ajustá según zona horaria deseada.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_slack_test:
        description: 'Enviar Slack de prueba aunque no haya cambios'
        required: false
        type: boolean
        default: false

concurrency:
  group: adzone-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar monitor
        id: monitor
        continue-on-error: true
        run: node scripts/monitor.mjs

      - name: Aviso si el monitor falló
        if: steps.monitor.outcome == 'failure'
        run: echo "::warning::Monitor con errores (red o HTTP); revisá el log y los artefactos del job."

      - name: Detectar cambios (snapshot / log)
        id: changes
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_slack_test }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Forzado por workflow_dispatch(force_slack_test=true): se notificará Slack."
            exit 0
          fi
          git add data/snapshot.json logs/changes.log
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios en snapshot ni log."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Hay cambios: se notificará Slack (si hay webhook) y luego commit."
          fi

      - name: Notificar Slack
        if: always() && steps.changes.outputs.changed == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MONITOR_OUTCOME: ${{ steps.monitor.outcome }}
        run: node scripts/notify-slack.mjs

      - name: Commit y push si hay cambios
        if: always() && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json logs/changes.log
          git commit -m "chore(monitor): cambio detectado en assets Adzone"
          git push
